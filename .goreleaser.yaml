version: 2

project_name: lazycut

builds:
  - id: lazycut
    main: .
    binary: lazycut
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: lazycut
    ids: [lazycut]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

release:
  draft: false
  prerelease: auto

brews:
  - name: lazycut
    repository:
      owner: ozemin
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: https://github.com/ozemin/lazycut
    description: Terminal-based video trimming TUI (ffmpeg + chafa)
    dependencies:
      - name: ffmpeg
      - name: chafa
    test: |
      system "ffmpeg", "-y", "-f", "lavfi", "-i",
        "color=c=red:s=320x240:d=1:r=25",
        "-c:v", "libx264", "-t", "1",
        testpath/"test.mp4"
      output = shell_output("#{bin}/lazycut probe #{testpath}/test.mp4")
      assert_match "Resolution: 320x240", output
      assert_match "Codec:      h264", output
      system bin/"lazycut", "trim",
        "--in", "00:00:00", "--out", "00:00:01",
        "-o", testpath/"trimmed.mp4",
        testpath/"test.mp4"
      assert_path_exists testpath/"trimmed.mp4"

changelog:
  use: github
