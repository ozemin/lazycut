version: 2

project_name: lazycut

builds:
  - id: lazycut
    main: .
    binary: lazycut
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: lazycut
    ids: [lazycut]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

release:
  draft: false
  prerelease: auto

brews:
  - name: lazycut
    repository:
      owner: ozemin
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: https://github.com/ozemin/lazycut
    description: Terminal-based video trimming TUI (ffmpeg + chafa)
    dependencies:
      - name: ffmpeg
      - name: chafa
    test: |
      output = shell_output("#{bin}/lazycut 2>&1", 1)
      assert_match "Usage: lazycut", output

changelog:
  use: github
